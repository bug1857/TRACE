services:
  - type: web
    name: trace-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        # Update this to your Vercel URL after frontend is deployed
        value: https://trace-app.vercel.app
      - key: MAX_UPLOAD_MB
        value: "50"
      - key: DATABASE_URL
        fromDatabase:
          name: trace-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: trace-db
    databaseName: trace
    plan: free

# ─── FREE TIER LIMITATIONS ────────────────────────────────────────────────────
# RENDER FREE TIER LIMITATIONS
# ─────────────────────────────
# 1. Backend cold-start: The service spins down after 15 minutes of inactivity.
#    First request after idle takes 30–60 seconds. This is visible to users.
#    Fix: Upgrade to Render Starter ($7/month) to disable spin-down.
#
# 2. PostgreSQL expiry: The free PostgreSQL database expires after 90 days.
#    Before expiry: run `pg_dump` to export data, then recreate the database.
#    Alternative: Use Neon (neon.tech) — free PostgreSQL with no expiry.
#    To switch: update DATABASE_URL on Render to the Neon connection string.
#
# 3. Build minutes: Render free tier includes 750 build minutes/month.
#    Each deploy uses ~3–5 minutes. Approximately 150–250 deploys/month.
